<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Production Metrics - Dolese Bros Co</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script>
(function () {
  try {
    var t = localStorage.getItem("pmd-theme");
    if (t !== "light" && t !== "dark") {
      t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
        ? "dark" : "light";
    }
    document.documentElement.setAttribute("data-theme", t);
  } catch (e) {
    document.documentElement.setAttribute("data-theme", "light");
  }
})();
</script>
<link rel="stylesheet" href="app.css">
</head>
<body>
<div class="shell">

  <div class="topbar">
    <div class="tlogo">
      <!-- Logo navigates back to the Dolese Operations OT portal in
           the SAME tab -- emulates a "back" button to the parent
           Ignition Perspective page that launched the dashboard.
           Same-tab nav (no target=_blank) because the operator's
           browser history then lets them rewind to the dashboard
           if they need it. Hardcoded URL because document.referrer
           is stripped on HTTPS->HTTP downgrade in browsers (Ignition
           is https, dashboard is http) so we can't reliably read
           the launching URL at runtime. Only the image is the link;
           the "Production Metrics" title stays a plain text label. -->
      <a class="tlogo-link" href="https://operationsot.dolese.com/data/perspective/client/Dolese_Plants_Enterprise_System/mainbreakpoint"
         aria-label="Return to Dolese Operations OT portal"
         title="Return to Dolese Operations OT portal">
        <img class="tlogo-img" src="/content/dolese-logo.png" alt="Dolese">
      </a>
      <b>Production Metrics</b>
    </div>
    <!-- Site selector: was a tab strip (one <button> per site). Now a
         <select> dropdown so the list scales beyond two sites without
         crowding the topbar. The selected option mirrors currentSiteId
         in app.js -- deep-linking via ?site_id= sets it on init; the
         change event drives the same refresh path the old buttons did.
         The empty wrapper is here so the existing .site-tog CSS (right
         border between site selector and view tabs) still applies. -->
    <div class="site-tog" id="site-tog">
      <select id="site-select" class="site-select"
              aria-label="Select site"></select>
    </div>
    <div class="view-tabs" id="view-tabs" role="tablist" aria-label="View selector">
      <!-- Order is deliberate (left-to-right):
           1. In-app views        : Production Dashboard, Production Charts
                                    (in-page vtabs swapped by app.js -- the
                                    data-view attribute is the internal key,
                                    NOT the visible label, so do not rename
                                    "dashboard"/"trends" here).
           2. Sibling-page nav    : Interval, Time Series
                                    (full page navigations to other routes
                                    served by the same backend).
           3. External Flow popouts: Charts, Forms
                                    (open Flow's web UI in a new tab; users
                                    are leaving the dashboard, so they sit
                                    after the in-app nav).
           4. API docs            : Swagger -- engineer-only, far right. -->
      <button class="vtab on" data-view="dashboard" role="tab" aria-selected="true">Production Dashboard</button>
      <button class="vtab"    data-view="trends"    role="tab" aria-selected="false">Production Charts</button>
      <!-- Interval: styled like a vtab so it visually matches the
           Charts / Forms dropdowns next to it, but it's a plain link
           (no dropdown) that navigates to /flow-interval-metrics.html.
           Label is "Interval" (the data shape -- hourly/shiftly buckets
           from Flow) rather than the source name "Metrics", which was
           ambiguous against the other nav entries. -->
      <a class="vtab" id="flow-metrics-link"
         href="/flow-interval-metrics.html"
         title="Open the Flow Interval Metrics page (hourly / shiftly buckets)"
         aria-label="Flow Interval Metrics page"><img class="btn-flow-logo" src="/content/flow-logo.png" alt="">Interval</a>
      <!-- Timebase Time Series (Phase 27): page-scoped JS, no
           polling. Delete this link + the two files in frontend/
           (timebase-trends.html / .js) to fully remove.
           Label is "Time Series" (the data shape -- raw, dense,
           timestamped samples) to distinguish from the bucketed
           "Interval" view next to it. -->
      <a class="vtab" id="timebase-trends-link"
         href="/timebase-trends.html"
         title="Open the Timebase Time Series page (raw historian samples, adjustable 2-12h window)"
         aria-label="Timebase Time Series page"><img class="btn-timebase-logo" src="/content/timebase-logo.png" alt="">Time Series</a>
      <!-- Charts dropdown: opens a menu of external chart URLs (OEE
           and similar Flow-server charts). Items render from
           EXTERNAL_LINKS_CHARTS in app.js. Each item opens in a new tab. -->
      <div class="vtab-dropdown">
        <button class="vtab vtab-trigger" id="extcharts-tab" type="button"
                aria-haspopup="menu" aria-expanded="false" aria-controls="extcharts-menu">
          <img class="btn-flow-logo" src="/content/flow-logo.png" alt="">Charts <span class="vtab-caret" aria-hidden="true">&#9662;</span>
        </button>
        <div class="vtab-menu" id="extcharts-menu" role="menu" hidden></div>
      </div>
      <!-- Forms dropdown: opens a menu of external page URLs (Belt
           Scale Entry and similar operator-facing forms). Items render
           from EXTERNAL_LINKS_FORMS in app.js. Each item opens in a new tab. -->
      <div class="vtab-dropdown">
        <button class="vtab vtab-trigger" id="charts-tab" type="button"
                aria-haspopup="menu" aria-expanded="false" aria-controls="charts-menu">
          <img class="btn-flow-logo" src="/content/flow-logo.png" alt="">Forms <span class="vtab-caret" aria-hidden="true">&#9662;</span>
        </button>
        <div class="vtab-menu" id="charts-menu" role="menu" hidden></div>
      </div>
      <!-- API docs: opens FastAPI's auto-generated Swagger UI in a
           new tab so the dashboard's filter / view state is preserved
           while operators browse the API reference. -->
      <a class="vtab" id="api-docs-link"
         href="docs"
         target="_blank"
         rel="noopener noreferrer"
         title="Open the FastAPI Swagger UI (/docs) in a new tab"
         aria-label="API docs">API</a>
    </div>
    <div style="flex:1"></div>
    <button class="export-btn" id="export-btn" type="button" disabled
            aria-label="Download current view as Excel (.xlsx)" title="Download as Excel">
      <svg viewBox="0 0 14 14" aria-hidden="true">
        <path fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"
              d="M7 1.5 v7.2 M4.3 6 L7 8.7 L9.7 6"/>
        <path fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"
              d="M2 10.5 v1.5 h10 v-1.5"/>
      </svg>
      <span>Excel</span>
    </button>
    <button class="theme-toggle" id="theme-toggle" type="button"
            aria-label="Toggle light / dark theme" title="Toggle theme"></button>
    <span class="health-pill" id="health-pill" title="API health">checking...</span>
    <span class="refresh-lbl" id="refresh-lbl">&mdash;</span>
  </div>

  <!-- ===== Dashboard view ===== -->
  <div class="canvas" id="dashboard-view">

    <aside class="sidebar">
      <div class="site-strip" id="site-strip">
        <span class="site-id" id="site-strip-id">&mdash;</span>
        <span class="site-nm" id="site-strip-name">&mdash;</span>
      </div>

      <div class="sb">
        <div class="sh">TIME FILTER</div>
        <div class="sd">
          <!-- Phase 7: absolute-window picker. Mode toggle swaps between
               a single-day picker and a month-year picker. -->
          <div class="gbr mode-toggle" id="mode-toggle" role="tablist" aria-label="Time filter mode">
            <button type="button" class="gb on" data-mode="day"   role="tab" aria-selected="true">Day</button>
            <button type="button" class="gb"    data-mode="month" role="tab" aria-selected="false">Month</button>
          </div>

          <div class="filter-body" id="day-body">
            <label class="filter-label" for="day-date">Date</label>
            <input class="date-input" type="date" id="day-date"
                   min="2020-01-01" aria-label="Select a production date">
          </div>

          <div class="filter-body" id="month-body" style="display:none">
            <label class="filter-label">Month</label>
            <div class="month-pickers">
              <select class="month-select" id="month-month" aria-label="Month">
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
              </select>
              <select class="month-select" id="month-year" aria-label="Year"></select>
            </div>
          </div>
        </div>
      </div>

      <div class="sb">
        <div class="sh">PRODUCTION ID FILTER</div>
        <div class="sd">
          <div class="gbr" id="prodid-filter" role="tablist" aria-label="Production ID prefix filter">
            <button type="button" class="gb on" data-prodid="all" role="tab" aria-selected="true">All</button>
            <button type="button" class="gb"    data-prodid="PR"  role="tab" aria-selected="false">PR</button>
            <button type="button" class="gb"    data-prodid="PRM" role="tab" aria-selected="false">PRM</button>
          </div>
        </div>
      </div>

      <div class="sb">
        <div class="sh">STATUS FILTER</div>
        <div class="sd">
          <div class="gbr" id="status-filter" role="tablist" aria-label="Workcenter status filter">
            <button type="button" class="gb on" data-status="all" role="tab" aria-selected="true">All</button>
            <button type="button" class="gb"    data-status="Scheduled" role="tab" aria-selected="false">Scheduled</button>
            <button type="button" class="gb"    data-status="Unscheduled" role="tab" aria-selected="false">Unscheduled</button>
          </div>
        </div>
      </div>

      <!-- ACTIVE FILTERS sidebar block hidden by request. The
           #chips element is still in the DOM so any code that
           populates it doesn't error; just not displayed. -->
      <div class="sb" style="display:none">
        <div class="sh">ACTIVE FILTERS</div>
        <div class="sd" id="chips"></div>
      </div>

      <div style="flex:1"></div>

      <div class="sb">
        <div class="sh">SOURCE</div>
        <div class="sd small">
          <div><span class="muted">Name:</span> <span id="src-name">&mdash;</span></div>
          <div><span class="muted">Status:</span> <span id="src-status">&mdash;</span></div>
          <div><span class="muted">Detail:</span> <span id="src-detail">&mdash;</span></div>
          <div><span class="muted">Checked:</span> <span id="src-checked">&mdash;</span></div>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="warn-bar err" id="err-bar" style="display:none"></div>
      <div id="wc-panels"></div>
      <div class="nd" id="empty-state" style="display:none">No production data for this selection.</div>
    </main>

  </div>

  <!-- ===== Trends view (Phase 10b) ===== -->
  <div class="canvas" id="trends-view" style="display:none">
    <main class="main trends-main">
      <div class="trends-controls">
        <div class="trends-control-group">
          <label class="filter-label">View</label>
          <div class="trends-bucket-toggle" id="trends-bucket-toggle" role="tablist" aria-label="Bucket selector">
            <button type="button" class="bucket-btn on" data-bucket="monthly" role="tab" aria-selected="true">Monthly</button>
            <button type="button" class="bucket-btn"    data-bucket="yearly"  role="tab" aria-selected="false">Yearly</button>
          </div>
        </div>
        <div class="trends-control-group trends-monthly-only" id="trends-monthly-from-group">
          <label class="filter-label" for="trends-from-month">From month</label>
          <input type="month" class="date-input" id="trends-from-month" aria-label="Trends from-month">
        </div>
        <div class="trends-control-group trends-monthly-only" id="trends-monthly-to-group">
          <label class="filter-label" for="trends-to-month">To month</label>
          <input type="month" class="date-input" id="trends-to-month" aria-label="Trends to-month">
        </div>
        <div class="trends-control-group trends-yearly-only" id="trends-yearly-from-group" style="display:none">
          <label class="filter-label" for="trends-from-year">From year</label>
          <select class="date-input" id="trends-from-year" aria-label="Trends from-year"></select>
        </div>
        <div class="trends-control-group trends-yearly-only" id="trends-yearly-to-group" style="display:none">
          <label class="filter-label" for="trends-to-year">To year</label>
          <select class="date-input" id="trends-to-year" aria-label="Trends to-year"></select>
        </div>
        <span class="trends-status muted" id="trends-status"></span>
        <div class="trends-control-group trends-formula-group">
          <label class="filter-label">Formula</label>
          <div class="trends-bucket-toggle" id="trends-formula-toggle" role="tablist" aria-label="Formula mode">
            <button type="button" class="bucket-btn on" data-formula="simplified" role="tab" aria-selected="true">Simplified</button>
            <button type="button" class="bucket-btn"    data-formula="verbose"    role="tab" aria-selected="false">Verbose</button>
          </div>
        </div>
      </div>

      <div class="warn-bar err" id="trends-err-bar" style="display:none"></div>
      <div class="trends-layout" id="trends-layout">
        <aside class="trends-tablist" id="trends-tablist" role="tablist" aria-label="Trends sections"></aside>
        <div class="trends-content" id="trends-grid"></div>
      </div>
      <div class="nd" id="trends-empty-state" style="display:none">No production data in this range.</div>
    </main>
  </div>
</div>

<!-- Phase 8: Details modal (shared by single-report and multi-report panels).
     Hidden until openDetailsModal() is called from a Details button. -->
<div class="details-modal-backdrop" id="details-modal" style="display:none"
     role="dialog" aria-modal="true" aria-labelledby="details-modal-title">
  <div class="details-modal">
    <div class="details-modal-header">
      <h2 class="details-modal-title" id="details-modal-title">Report Details</h2>
      <button class="details-modal-close" type="button" aria-label="Close details">&times;</button>
    </div>
    <div class="details-modal-body" id="details-modal-body">
      <!-- filled dynamically by openDetailsModal() -->
    </div>
  </div>
</div>

<script src="vendor/chart.umd.js"></script>
<script src="vendor/xlsx.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
