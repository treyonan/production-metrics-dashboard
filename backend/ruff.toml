line-length = 100
target-version = "py312"
extend-exclude = ["venv", ".venv"]

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]

[lint.per-file-ignores]
"tests/**/*.py" = ["B"]  # tests often do things bugbear dislikes

[format]
quote-style = "double"
indent-style = "space"
