# ============================================================================
# Timebase i3X tag catalog -- TEMPLATE (catalog.example.yaml).
#
# This file is committed and intentionally contains NO real historian URLs.
# To deploy:
#   1. Copy this file to catalog.yaml (gitignored).
#   2. Replace every `historian.example.invalid` placeholder with the real
#      base_url for that site's historian.
#
# The loader prefers catalog.yaml; if missing, falls back to this file
# (useful for tests + CI). In production catalog.yaml MUST exist with
# real base_urls or every site's historian will be unreachable.
#
# Schema v2 (2026-05-21): per-site asset placement.
#
# Two layers:
#   sites:         per-site config (base_url + dataset + departments).
#                  Each department block holds its prefix path AND the
#                  per-class asset list. A conveyor at BCQ may live in
#                  Secondary while the same conveyor number at ARP lives
#                  in Primary -- placement is intrinsically per-site.
#   asset_classes: shared metric-definition registry per class. Same
#                  TPH suffix for any conveyor anywhere. No global
#                  asset list -- each site declares its own.
#
# Full elementId resolved as:
#
#   <dataset>:<departments[D].prefix>/<asset_class>/<asset>/<metrics[K].suffix>
#
# Example: (site_id='101', dept='Secondary', class='Conveyor', asset='C1',
# metric='belt_scale_tph') ->
#   IAP_BCQ_Controls:Big_Canyon/Secondary/Conveyor/C1/Process_Data/Belt_Scale/TPH
#
# Adding a new site:     add a top-level entry under `sites:`.
# Adding a new metric:   add one entry under `asset_classes.<class>.metrics:`
#                        -- applies to every site at once.
# Moving an asset:       edit only that site's departments block.
# ============================================================================

sites:
  "101":
    code: BCQ
    display_name: Big Canyon Quarry
    base_url: http://historian.example.invalid:4511   # REPLACE in catalog.yaml
    dataset: IAP_BCQ_Controls
    departments:
      Secondary:
        prefix: Big_Canyon/Secondary
        assets:
          Conveyor: [C1, C2, C3, C4, C5, C6, C7, C8]

  # Sketch demonstrating per-site placement -- enable in catalog.yaml
  # when Ardmore's historian comes online. The conveyor numbers don't
  # collide because the full elementId is dataset+prefix-scoped.
  #
  # "100":
  #   code: ARP
  #   display_name: Ardmore Quarry
  #   base_url: http://historian.example.invalid:4511
  #   dataset: IAP_ARP_Controls
  #   departments:
  #     Primary:
  #       prefix: Ardmore/Primary
  #       assets:
  #         Conveyor: [C1, C2]
  #     Secondary:
  #       prefix: Ardmore/Secondary
  #       assets:
  #         Conveyor: [C3, C4, C5, C6, C7, C8]

asset_classes:
  Conveyor:
    # Metric registry only -- no global asset list. Each site/department
    # declares which conveyors it owns; metrics here apply to all of them.
    metrics:
      belt_scale_tph:
        display_name: Belt Scale TPH
        unit: tph
        suffix: Process_Data/Belt_Scale/TPH
      belt_scale_total:
        display_name: Belt Scale Total
        unit: tons
        suffix: Process_Data/Belt_Scale/Total
