<!DOCTYPE html>
<!--
  Flow Interval Metrics -- secondary data source
  Reads from /api/metrics/{subject_type}/{interval} and /subjects.
  Standalone page; not linked from the main dashboard but uses the
  same CSS variables, fonts, and theme toggle (localStorage key:
  "pmd-theme") so it feels native to the project.
  Phase 16 -- promoted from POC to production 2026-04-30.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flow Interval Metrics</title>
<style>
  :root,
  :root[data-theme="light"] {
    --bg-shell: #201f1e;
    --bg-canvas: #f3f2f1;
    --bg-card: #ffffff;
    --bg-subtle: #faf9f8;
    --border: #e1dfdd;
    --border-strong: #c8c6c4;
    --text: #201f1e;
    --text-muted: #605e5c;
    --text-faint: #a19f9d;
    --accent: #00502f;
    --accent-tint: #e6efe9;
    --primary-bg: #00502f;
    --primary-bg-hover: #003d23;
    --primary-border: #002a18;
    --error-bg: #fde7e9;
    --error-fg: #a4262c;
    --error-border: #f3b3b8;
    --warn-bg: #fff4ce;
    --warn-fg: #8a6300;
    --warn-border: #f3d793;
    --shell-text: #f3f2f1;
    --shell-text-muted: #c8c6c4;
    --shell-button-bg: #3b3a39;
    --shell-hover-bg: #484644;
    --row-hover: #faf9f8;
  }
  :root[data-theme="dark"] {
    --bg-shell: #1b1a19;
    --bg-canvas: #252423;
    --bg-card: #323130;
    --bg-subtle: #2d2c2b;
    --border: #484644;
    --border-strong: #605e5c;
    --text: #f3f2f1;
    --text-muted: #c8c6c4;
    --text-faint: #a19f9d;
    --accent: #66877a;
    --accent-tint: #1a3326;
    --primary-bg: #00502f;
    --primary-bg-hover: #003d23;
    --primary-border: #002a18;
    --error-bg: #442726;
    --error-fg: #f1707b;
    --error-border: #6f3a3d;
    --warn-bg: #443c1e;
    --warn-fg: #ffce46;
    --warn-border: #7a6a30;
    --shell-text: #f3f2f1;
    --shell-text-muted: #c8c6c4;
    --shell-button-bg: #3b3a39;
    --shell-hover-bg: #484644;
    --row-hover: #3b3a39;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-canvas);
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
    line-height: 1.4;
    min-height: 100vh;
  }
  /* Topbar -- mirrors frontend/app.css's .topbar so navigating between
     this page and the main dashboard doesn't visually shift anything.
     Same 40px height, same dark-shell background, same 2px brand-yellow
     border at the bottom. */
  header.topbar {
    height: 40px;
    background: var(--bg-shell);
    color: var(--shell-text);
    padding: 0 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #ffde74;
  }
  .brand-row {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  /* Match the main dashboard's .tlogo-img height so the logo lands in
     the same vertical band. */
  .brand-logo {
    height: 28px;
    width: auto;
    display: block;
    flex-shrink: 0;
  }
  .brand { display: flex; flex-direction: column; gap: 2px; }
  .brand b {
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.3px;
    color: var(--shell-text);
  }
  .brand small {
    font-weight: 400;
    color: var(--shell-text-muted);
    font-size: 11px;
  }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  /* Dashboard back-link styled exactly like the main dashboard's
     .nav-link (which links the other direction to /flow-interval-metrics).
     Same 26px height, padding, font, and pill-button look. */
  .home-link {
    height: 26px;
    padding: 0 12px;
    margin-right: 10px;
    display: inline-flex;
    align-items: center;
    border-radius: 2px;
    background: var(--shell-button-bg);
    color: var(--shell-text);
    text-decoration: none;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
    border: 1px solid transparent;
    cursor: pointer;
    white-space: nowrap;
  }
  .home-link:hover { background: var(--shell-hover-bg); }
  .home-link:active { transform: translateY(1px); }
  /* Theme toggle: small square icon button, same style as the main
     dashboard's .theme-toggle in app.css. JS swaps a sun/moon SVG
     in based on the active theme. */
  .theme-toggle {
    height: 26px;
    width: 26px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--shell-button-bg);
    border: 1px solid var(--border-strong);
    border-radius: 2px;
    color: var(--shell-text);
    cursor: pointer;
    transition: background .15s, color .15s, transform .1s;
  }
  .theme-toggle:hover { background: var(--shell-hover-bg); }
  .theme-toggle:active { transform: translateY(1px); }
  .theme-toggle svg { display: block; width: 14px; height: 14px; }
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 16px 24px;
  }
  .panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .panel h2 {
    margin: 0 0 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group { margin-bottom: 14px; }
  .form-group:last-of-type { margin-bottom: 0; }
  .form-group-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
  label.field {
    display: flex;
    flex-direction: column;
    font-size: 12px;
    gap: 4px;
    color: var(--text-muted);
    flex: 0 0 auto;
  }
  label.field input, label.field select {
    font-family: inherit;
    font-size: 13px;
    padding: 6px 10px;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: 2px;
    color: var(--text);
    min-width: 160px;
  }
  label.field input:focus, label.field select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  :root[data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
  }
  button.action {
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 18px;
    border-radius: 2px;
    border: 1px solid var(--primary-border);
    background: var(--primary-bg);
    color: white;
    cursor: pointer;
  }
  button.action:hover { background: var(--primary-bg-hover); }
  button.action.secondary {
    background: var(--bg-card);
    color: var(--text);
    border-color: var(--border-strong);
  }
  button.action.secondary:hover {
    background: var(--bg-subtle);
    border-color: var(--text-muted);
  }
  .actions-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .status {
    font-size: 12px;
    color: var(--text-muted);
    padding: 8px 12px;
    border-radius: 2px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    margin-bottom: 12px;
    display: none;
  }
  .status.show { display: block; }
  .status.error {
    background: var(--error-bg);
    color: var(--error-fg);
    border-color: var(--error-border);
  }
  .status.warn {
    background: var(--warn-bg);
    color: var(--warn-fg);
    border-color: var(--warn-border);
  }
  .summary-row {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    padding: 10px 14px;
    background: var(--accent-tint);
    border: 1px solid var(--border);
    border-radius: 2px;
    margin-bottom: 12px;
    font-size: 12px;
    color: var(--text);
  }
  .summary-row .label { color: var(--text-muted); margin-right: 4px; }
  .summary-row .val { font-weight: 600; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: var(--bg-subtle);
    font-weight: 600;
    text-align: left;
    padding: 8px 10px;
    border-bottom: 2px solid var(--border-strong);
    color: var(--text);
  }
  tbody td {
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  tbody tr:hover td { background: var(--row-hover); }
  th.num, td.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  th.ts, td.ts {
    font-variant-numeric: tabular-nums;
    font-family: "Cascadia Mono", "Consolas", "Courier New", monospace;
    white-space: nowrap;
    font-size: 12px;
  }
  td.num { font-family: "Cascadia Mono", "Consolas", "Courier New", monospace; }
  pre {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 2px;
    overflow-x: auto;
    font-size: 12px;
    margin: 0;
    color: var(--text);
    max-height: 400px;
    overflow-y: auto;
  }
  .empty {
    padding: 32px 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    font-style: italic;
  }
</style>
</head>
<body>
<header class="topbar">
  <div class="brand-row">
    <img class="brand-logo" src="/content/dolese-logo.png" alt="Dolese">
    <div class="brand">
      <b>Flow Interval Metrics</b>
      <small>Secondary data source &mdash; aggregated metrics from Flow REST API</small>
    </div>
  </div>
  <div class="topbar-actions">
    <a class="home-link" href="/">Dashboard</a>
    <button class="theme-toggle" id="theme_toggle" type="button" aria-label="Toggle light/dark theme" title="Toggle theme"></button>
  </div>
</header>

<main>
  <div class="panel">
    <div class="form-group">
      <div class="form-group-label">Context</div>
      <div class="row">
        <label class="field">Site ID
          <input type="number" id="site_id" value="101">
        </label>
        <label class="field">Subject Type
          <select id="subject_type">
            <option>workcenter</option>
            <option>conveyor</option>
            <option>circuit</option>
            <option>line</option>
            <option>equipment</option>
            <option>site</option>
          </select>
        </label>
        <label class="field">Interval
          <select id="interval">
            <option>shiftly</option>
            <option>hourly</option>
          </select>
        </label>
      </div>
    </div>

    <div class="form-group">
      <div class="form-group-label">Filters (Optional)</div>
      <div class="row">
        <label class="field">Subject ID
          <input type="text" id="subject_id" placeholder="e.g. Secondary">
        </label>
        <label class="field">Department ID
          <input type="text" id="department_id" placeholder="e.g. 127">
        </label>
        <label class="field">Metric
          <input type="text" id="metric" placeholder="e.g. Total or Rate">
        </label>
      </div>
    </div>

    <div class="form-group">
      <div class="form-group-label">Date Range</div>
      <div class="row">
        <label class="field">From Date
          <input type="date" id="from_date">
        </label>
        <label class="field">To Date
          <input type="date" id="to_date">
        </label>
      </div>
    </div>

    <div class="actions-row">
      <button class="action" id="fetch_btn">Fetch metrics</button>
      <button class="action secondary" id="subjects_btn">List subjects</button>
    </div>
  </div>

  <div id="status" class="status"></div>

  <div id="results" class="panel" style="display:none;">
    <h2>Entries</h2>
    <div id="summary" class="summary-row" style="display:none;"></div>
    <table id="results_table">
      <thead><tr>
        <th class="ts">Bucket Start (UTC)</th>
        <th class="ts">Bucket End (UTC)</th>
        <th>Subject</th>
        <th>Metric</th>
        <th class="num">Value</th>
        <th>Unit</th>
        <th class="num">Quality</th>
      </tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="subjects_panel" class="panel" style="display:none;">
    <h2>Subjects</h2>
    <pre id="subjects_pre"></pre>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);

// Theme: shares the localStorage key with the main dashboard so a
// preference set in one place carries to the other.
// Sun / moon SVGs lifted verbatim from frontend/app.js so the icon
// looks identical to the main dashboard's theme toggle.
const SUN_SVG = `
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <circle cx="7" cy="7" r="2.4" fill="currentColor"/>
    <g stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
      <line x1="7" y1="1"    x2="7"  y2="2.6"/>
      <line x1="7" y1="11.4" x2="7"  y2="13"/>
      <line x1="1" y1="7"    x2="2.6" y2="7"/>
      <line x1="11.4" y1="7" x2="13" y2="7"/>
      <line x1="2.8" y1="2.8"  x2="3.9" y2="3.9"/>
      <line x1="10.1" y1="10.1" x2="11.2" y2="11.2"/>
      <line x1="11.2" y1="2.8" x2="10.1" y2="3.9"/>
      <line x1="3.9"  y1="10.1" x2="2.8" y2="11.2"/>
    </g>
  </svg>`;
const MOON_SVG = `
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path fill="currentColor"
          d="M11.2 8.8a4.6 4.6 0 0 1-5.9-5.9.4.4 0 0 0-.54-.5 5.6 5.6 0 1 0 6.94 6.94.4.4 0 0 0-.5-.54z"/>
  </svg>`;

function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem("pmd-theme", theme);
  const btn = $("theme_toggle");
  if (btn) {
    btn.innerHTML = theme === "dark" ? SUN_SVG : MOON_SVG;
    const label = theme === "dark" ? "Switch to light theme" : "Switch to dark theme";
    btn.setAttribute("aria-label", label);
    btn.setAttribute("title", label);
  }
}
function initTheme() {
  const stored = localStorage.getItem("pmd-theme");
  const prefersDark =
    window.matchMedia &&
    window.matchMedia("(prefers-color-scheme: dark)").matches;
  applyTheme(stored || (prefersDark ? "dark" : "light"));
}
initTheme();
$("theme_toggle").addEventListener("click", () => {
  const cur = document.documentElement.getAttribute("data-theme");
  applyTheme(cur === "dark" ? "light" : "dark");
});

function setDefaultDates() {
  const today = new Date();
  const past = new Date();
  past.setDate(today.getDate() - 14);
  const iso = (d) => d.toISOString().slice(0, 10);
  $("from_date").value = iso(past);
  $("to_date").value = iso(today);
}
setDefaultDates();

function setStatus(msg, kind) {
  const el = $("status");
  el.className = "status show" + (kind ? " " + kind : "");
  el.textContent = msg;
}

function escapeHtml(s) {
  return String(s).replace(/[<>&"']/g, (c) => ({
    "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function formatValue(v) {
  if (v == null || v === "") return "";
  if (typeof v === "number") {
    return v.toLocaleString(undefined, { maximumFractionDigits: 4 });
  }
  return String(v);
}

async function fetchMetrics() {
  const params = new URLSearchParams();
  params.set("site_id", $("site_id").value);
  if ($("subject_id").value.trim()) params.set("subject_id", $("subject_id").value.trim());
  if ($("department_id").value.trim()) params.set("department_id", $("department_id").value.trim());
  if ($("metric").value.trim()) params.set("metric", $("metric").value.trim());
  params.set("from_date", $("from_date").value);
  params.set("to_date", $("to_date").value);

  const url = `/api/metrics/${$("subject_type").value}/${$("interval").value}?${params}`;
  setStatus(`Fetching ${url} ...`);
  $("results").style.display = "none";

  try {
    const resp = await fetch(url);
    const body = await resp.json();
    if (!resp.ok) {
      const detail = body.detail || body;
      const msg = typeof detail === "string" ? detail : JSON.stringify(detail);
      setStatus(`HTTP ${resp.status}: ${msg}`, "error");
      return;
    }
    renderEntries(body);
  } catch (e) {
    setStatus(`Network error: ${e.message}`, "error");
  }
}

function renderEntries(body) {
  const tbody = $("results_table").querySelector("tbody");
  tbody.innerHTML = "";

  if (!body.entries || body.entries.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">No entries returned for this filter combination.</td></tr>';
    $("summary").style.display = "none";
  } else {
    for (const e of body.entries) {
      const tr = document.createElement("tr");
      const cells = [
        { v: e.bucket_start, cls: "ts" },
        { v: e.bucket_end, cls: "ts" },
        { v: e.subject_id, cls: "" },
        { v: e.metric, cls: "" },
        { v: formatValue(e.value), cls: "num" },
        { v: e.unit, cls: "" },
        { v: e.quality_code, cls: "num" },
      ];
      tr.innerHTML = cells.map(({v, cls}) =>
        `<td${cls ? ' class="' + cls + '"' : ""}>${escapeHtml(v ?? "")}</td>`
      ).join("");
      tbody.appendChild(tr);
    }
    $("summary").style.display = "flex";
    $("summary").innerHTML =
      `<div><span class="label">Count:</span><span class="val">${body.count}</span></div>` +
      `<div><span class="label">Subject type:</span><span class="val">${escapeHtml(body.subject_type)}</span></div>` +
      `<div><span class="label">Interval:</span><span class="val">${escapeHtml(body.interval)}</span></div>` +
      `<div><span class="label">Range:</span><span class="val">${escapeHtml(body.from_date)} &rarr; ${escapeHtml(body.to_date)}</span></div>` +
      `<div><span class="label">Truncated:</span><span class="val">${body.truncated ? "yes" : "no"}</span></div>`;
  }

  $("results").style.display = "block";
  if (body.truncated) {
    setStatus(
      `Fetched ${body.count} entries. Result was truncated by Flow's per-tag cap. Narrow the window or add a filter.`,
      "warn"
    );
  } else {
    setStatus(`Fetched ${body.count} entries from ${body.from_date} to ${body.to_date}.`);
  }
}

async function listSubjects() {
  const params = new URLSearchParams();
  params.set("site_id", $("site_id").value);
  if ($("department_id").value.trim()) params.set("department_id", $("department_id").value.trim());
  const url = `/api/metrics/${$("subject_type").value}/subjects?${params}`;
  setStatus(`Fetching ${url} ...`);
  $("subjects_panel").style.display = "none";
  try {
    const resp = await fetch(url);
    const body = await resp.json();
    if (!resp.ok) {
      const detail = body.detail || body;
      const msg = typeof detail === "string" ? detail : JSON.stringify(detail);
      setStatus(`HTTP ${resp.status}: ${msg}`, "error");
      return;
    }
    $("subjects_pre").textContent = JSON.stringify(body, null, 2);
    $("subjects_panel").style.display = "block";
    setStatus(`Found ${body.count} subjects.`);
  } catch (e) {
    setStatus(`Network error: ${e.message}`, "error");
  }
}

$("fetch_btn").addEventListener("click", fetchMetrics);
$("subjects_btn").addEventListener("click", listSubjects);
</script>
</body>
</html>
